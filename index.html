<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的網頁應用程式</title>
    <!-- 使用 Tailwind CSS 確保介面美觀 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">網頁已成功運行</h1>
        <p class="text-gray-600 mb-6">如果你看到這個畫面，代表 Vercel 已正確解析你的 HTML 檔案。</p>
        
        <div id="app-content" class="p-4 bg-blue-50 rounded-lg border border-blue-100 text-blue-700">
            <!-- 你的程式邏輯顯示區域 -->
            等待 JavaScript 載入...
        </div>

        <button onclick="handleAction()" class="mt-6 px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
            點擊測試
        </button>
    </div>

    <script>
        // 確保 DOM 載入後再執行
        window.onload = function() {
            const content = document.getElementById('app-content');
            content.innerText = "JavaScript 運作正常！你可以把原本的邏輯寫在這裡。";
            console.log("應用程式初始化成功");
        };

        function handleAction() {
            const content = document.getElementById('app-content');
            content.innerText = "按鈕點擊成功！時間：" + new Date().toLocaleTimeString();
            content.classList.replace('bg-blue-50', 'bg-green-50');
            content.classList.replace('text-blue-700', 'text-green-700');
        }
    </script>
</body>
</html>
