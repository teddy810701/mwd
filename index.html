<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>績效考核系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 簡易 Lucide 元件包裝
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const icon = lucide.createIcons({
                    icons: { [name]: lucide[name] },
                    attrs: { strokeWidth: 2, width: size, height: size, class: className }
                });
            }, [name, size, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            // --- 初始資料與配置 ---
            const DEFAULT_INITIAL_POINTS = 600;
            const GLOBAL_BASE_BONUS = 600;

            const PERFORMANCE_ITEMS = {
                penalty: [
                    { label: '遲到 (預設1分/可修改)', val: -1 },
                    { label: '延遲開工 (15分以上)', val: -10 },
                    { label: '工作態度不佳 (不服管教)', val: -5 },
                    { label: '作業失誤-輕 (漏餐具等)', val: -2 },
                    { label: '作業失誤-重 (燒焦/客訴)', val: -5 },
                    { label: '環境責任 (收班不確實)', val: -3 },
                    { label: '服儀不整', val: -2 },
                    { label: '其他扣分事項', val: -1 }
                ],
                bonus: [
                    { label: '申請打掃環境', val: 2 },
                    { label: '支援另一間店', val: 1 },
                    { label: '獲得顧客五星評論', val: 2 },
                    { label: '表現優異 (店長推薦)', val: 5 },
                    { label: '其他加分事項', val: 1 }
                ]
            };

            const [employees, setEmployees] = useState([
                { id: 1, name: '王小明', shop: '西螺文昌店', startDate: '2023-03-28', level: '全能夥伴', skillsPassed: 3, initialPoints: 600, currentPoints: 585, multiplier: 1.4, lastYearLow: false },
                { id: 2, name: '李小華', shop: '斗南站前店', startDate: '2024-05-15', level: '熟練夥伴', skillsPassed: 2, initialPoints: 600, currentPoints: 495, multiplier: 1.1, lastYearLow: false }
            ]);

            const [activeTab, setActiveTab] = useState('employee');
            const [selectedEmpId, setSelectedEmpId] = useState(1);
            const [logs, setLogs] = useState([
                { id: 101, empId: 1, occurrenceDate: '2024-01-10', name: '王小明', amount: 5, reason: '表現優異', note: '環境整理非常到位', operator: '店長', timestamp: '2024-01-10 10:00' },
                { id: 102, empId: 1, occurrenceDate: '2024-02-05', name: '王小明', amount: -20, reason: '遲到 (預設1分/可修改)', note: '遲到20分鐘', operator: '店長', timestamp: '2024-02-05 08:30' }
            ]);

            const [authMode, setAuthMode] = useState(null);
            const [passwordInput, setPasswordInput] = useState('');
            const [selectedItemLabel, setSelectedItemLabel] = useState('');
            const [customPoints, setCustomPoints] = useState(0);
            const [occurrenceDate, setOccurrenceDate] = useState(new Date().toISOString().split('T')[0]);
            const [note, setNote] = useState('');
            const [systemMessage, setSystemMessage] = useState(null);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().substring(0, 7));
            const [editingEmp, setEditingEmp] = useState(null);
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [deletingEmpId, setDeletingEmpId] = useState(null);

            useEffect(() => {
                lucide.createIcons();
            });

            const showMessage = (text, type = 'info') => {
                setSystemMessage({ text, type });
                setTimeout(() => setSystemMessage(null), 3000);
            };

            const calculateSeniority = (startDate) => {
                if (!startDate) return { years: 0, months: 0, isEligible: false, text: '未設定' };
                const start = new Date(startDate);
                const now = new Date();
                let years = now.getFullYear() - start.getFullYear();
                const anniversaryThisYear = new Date(start);
                anniversaryThisYear.setFullYear(now.getFullYear());
                if (now < anniversaryThisYear) years--;
                let months = now.getMonth() - start.getMonth();
                if (now.getDate() < start.getDate()) months--;
                if (months < 0) months += 12;
                return { years: Math.max(0, years), months: Math.max(0, months), isEligible: years >= 1, text: `${Math.max(0, years)}年${Math.max(0, months)}個月` };
            };

            const getLevelAndMultiplierBySkills = (skills) => {
                if (skills >= 3) return { level: '全能夥伴', minMult: 1.3, maxMult: 1.5, defaultMult: 1.4 };
                if (skills === 2) return { level: '熟練夥伴', minMult: 1.0, maxMult: 1.3, defaultMult: 1.1 };
                return { level: '一般夥伴', minMult: 0, maxMult: 0, defaultMult: 0 };
            };

            const calculateResult = (points, lastYearLow) => {
                if (lastYearLow && points < 499) return { status: 'D (淘汰)', color: 'text-gray-900', bg: 'bg-gray-900 text-white', desc: '不合格且去年已警示' };
                if (points >= 500) return { status: 'A (合格)', color: 'text-green-600', bg: 'bg-green-100 text-green-800', desc: '年度加級正常發放' };
                if (points >= 481) return { status: 'B (警示)', color: 'text-orange-600', bg: 'bg-yellow-100 text-yellow-800', desc: '金額減半' };
                return { status: 'C (重罰)', color: 'text-red-600', bg: 'bg-red-100 text-red-800', desc: '取消年度加級資格' };
            };

            const calculateFinalPay = (emp) => {
                if (!emp || emp.skillsPassed < 2) return 0;
                const seniority = calculateSeniority(emp.startDate);
                if (!seniority.isEligible) return 0;
                const res = calculateResult(emp.currentPoints, emp.lastYearLow);
                const base = GLOBAL_BASE_BONUS * emp.multiplier;
                if (res.status.includes('A')) return Math.round(base);
                if (res.status.includes('B')) return Math.round(base / 2);
                return 0;
            };

            const handlePointChange = (empId, amount, reason, operator = '店長') => {
                const targetEmp = employees.find(e => e.id === empId);
                if (!targetEmp) return;
                setEmployees(prev => prev.map(emp => emp.id === empId ? { ...emp, currentPoints: emp.currentPoints + amount } : emp));
                const newLog = { id: Date.now(), empId, occurrenceDate, name: targetEmp.name, amount, reason, note, operator, timestamp: new Date().toLocaleString() };
                setLogs(prevLogs => [newLog, ...prevLogs]);
                setNote('');
                setSelectedItemLabel('');
                setCustomPoints(0);
                showMessage(`${targetEmp.name} 分數已變動 ${amount > 0 ? '+' : ''}${amount}`, 'success');
            };

            const handleSaveEmpEdit = () => {
                if (!editingEmp) return;
                if (isAddingNew) {
                    setEmployees(prev => [...prev, editingEmp]);
                    showMessage('新夥伴註冊成功', 'success');
                } else {
                    setEmployees(prev => prev.map(emp => emp.id === editingEmp.id ? editingEmp : emp));
                    showMessage('夥伴資料已更新', 'success');
                }
                setEditingEmp(null);
                setIsAddingNew(false);
            };

            const handleAuth = () => {
                if (authMode === 'manager' && passwordInput === '8888') {
                    setActiveTab('manager'); setAuthMode(null); setPasswordInput('');
                } else if (authMode === 'admin' && passwordInput === '9999') {
                    setActiveTab('admin'); setAuthMode(null); setPasswordInput('');
                } else {
                    setPasswordInput(''); showMessage('密碼錯誤', 'error');
                }
            };

            const selectedEmp = employees.find(e => e.id === selectedEmpId) || employees[0];
            const filteredPersonalLogs = logs
                .filter(log => log.empId === selectedEmp?.id)
                .filter(log => log.occurrenceDate.startsWith(selectedMonth));

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    {/* 系統提示 */}
                    {systemMessage && (
                        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[1000] px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2 animate-bounce ${systemMessage.type === 'error' ? 'bg-red-600 text-white' : systemMessage.type === 'success' ? 'bg-green-600 text-white' : 'bg-gray-800 text-white'}`}>
                            {systemMessage.text}
                        </div>
                    )}

                    {/* 導航 */}
                    <nav className="bg-white border-b sticky top-0 z-50 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
                            <h1 className="text-xl font-bold text-orange-600 flex items-center gap-2">
                                <Icon name="ShieldCheck" className="text-orange-600" /> 績效考核系統
                            </h1>
                            <div className="flex bg-gray-100 p-1.5 rounded-xl gap-1">
                                <button onClick={() => setActiveTab('employee')} className={`px-4 py-1.5 rounded-lg text-xs font-black transition ${activeTab === 'employee' ? 'bg-white shadow-sm text-orange-600' : 'text-gray-500'}`}>查詢</button>
                                <button onClick={() => setAuthMode('manager')} className={`px-4 py-1.5 rounded-lg text-xs font-black transition ${activeTab === 'manager' ? 'bg-orange-600 text-white shadow-md' : 'text-gray-500'}`}>店長</button>
                                <button onClick={() => setAuthMode('admin')} className={`px-3 py-1.5 rounded-lg text-xs font-black transition ${activeTab === 'admin' ? 'bg-red-600 text-white shadow-md' : 'text-gray-500'}`}>
                                    <Icon name="Lock" size={14} />
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto p-4">
                        {/* 查詢模式 */}
                        {activeTab === 'employee' && selectedEmp && (
                            <div className="space-y-6">
                                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide justify-center">
                                    {employees.map(emp => (
                                        <button key={emp.id} onClick={() => setSelectedEmpId(emp.id)} className={`px-5 py-2 rounded-full whitespace-nowrap text-xs font-black transition-all ${selectedEmpId === emp.id ? 'bg-gray-900 text-white shadow-lg' : 'bg-white text-gray-400 border'}`}>{emp.name}</button>
                                    ))}
                                </div>
                                <div className="bg-white rounded-3xl overflow-hidden shadow-xl border border-gray-100">
                                    <div className="bg-gradient-to-br from-orange-500 to-orange-600 p-8 text-white text-center">
                                        <p className="text-[10px] bg-white/20 inline-block px-3 py-1 rounded-full mb-3 uppercase font-bold tracking-widest">{selectedEmp.shop} | {selectedEmp.level}</p>
                                        <h2 className="text-5xl font-black mb-2">{selectedEmp.name}</h2>
                                        <div className="flex justify-center items-center gap-2 text-xs opacity-90 font-bold">
                                            <Icon name="Calendar" size={14} /> 到職日：{selectedEmp.startDate} ({calculateSeniority(selectedEmp.startDate).text})
                                        </div>
                                    </div>
                                    <div className="p-6 grid grid-cols-2 gap-4 text-center">
                                        <div className="bg-gray-50 p-4 rounded-2xl border">
                                            <p className="text-[10px] text-gray-400 font-bold mb-1 uppercase">累積積分</p>
                                            <p className="text-4xl font-black text-gray-700">{selectedEmp.currentPoints}</p>
                                        </div>
                                        <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100">
                                            <p className="text-[10px] text-orange-400 font-bold mb-1 uppercase">預估獎勵</p>
                                            <p className="text-4xl font-black text-orange-600">${calculateFinalPay(selectedEmp)}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 店長模式 */}
                        {activeTab === 'manager' && (
                            <div className="bg-white p-6 rounded-2xl border shadow-sm space-y-6">
                                <h2 className="text-lg font-bold flex items-center gap-2"><Icon name="Store" size={20}/> 評分操作區</h2>
                                <div className="flex gap-2 overflow-x-auto pb-4">
                                    {employees.map(emp => (
                                        <button key={emp.id} onClick={() => setSelectedEmpId(emp.id)} className={`px-4 py-3 rounded-xl min-w-[100px] border-2 transition text-left ${selectedEmpId === emp.id ? 'border-orange-500 bg-orange-50' : 'border-gray-100'}`}>
                                            <span className="block font-bold">{emp.name}</span>
                                            <span className="text-[10px] opacity-50">{emp.shop}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <select value={selectedItemLabel} onChange={(e) => {
                                        const label = e.target.value;
                                        setSelectedItemLabel(label);
                                        const allItems = [...PERFORMANCE_ITEMS.penalty, ...PERFORMANCE_ITEMS.bonus];
                                        const item = allItems.find(i => i.label === label);
                                        if (item) setCustomPoints(item.val);
                                    }} className="p-3 bg-gray-50 rounded-xl border-2 font-bold outline-none">
                                        <option value="">選擇項目</option>
                                        {PERFORMANCE_ITEMS.penalty.map(i => <option key={i.label} value={i.label}>🔴 {i.label}</option>)}
                                        {PERFORMANCE_ITEMS.bonus.map(i => <option key={i.label} value={i.label}>🟢 {i.label}</option>)}
                                    </select>
                                    <input type="number" value={customPoints} onChange={e => setCustomPoints(parseInt(e.target.value))} className="p-3 border-2 rounded-xl text-center font-black" />
                                </div>
                                <textarea placeholder="備註原因..." value={note} onChange={e => setNote(e.target.value)} className="w-full h-24 p-3 border-2 rounded-xl outline-none" />
                                <button onClick={() => handlePointChange(selectedEmpId, customPoints, selectedItemLabel)} disabled={!selectedItemLabel} className="w-full py-4 bg-orange-600 text-white rounded-2xl font-black shadow-lg">提交評分</button>
                            </div>
                        )}

                        {/* 管理員模式 */}
                        {activeTab === 'admin' && (
                            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                                <div className="p-4 bg-red-600 text-white flex justify-between items-center">
                                    <h3 className="font-bold">夥伴名單管理</h3>
                                    <button onClick={() => {
                                        setEditingEmp({ id: Date.now(), name: '', shop: '', startDate: '', level: '一般夥伴', skillsPassed: 0, initialPoints: 600, currentPoints: 600, multiplier: 0, lastYearLow: false });
                                        setIsAddingNew(true);
                                    }} className="bg-white text-red-600 px-3 py-1 rounded-lg text-xs font-black">新增夥伴</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead className="bg-gray-50 text-gray-400">
                                            <tr>
                                                <th className="p-4 text-left">姓名</th>
                                                <th className="p-4 text-left">職級</th>
                                                <th className="p-4 text-left">當前分</th>
                                                <th className="p-4 text-right">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {employees.map(emp => (
                                                <tr key={emp.id}>
                                                    <td className="p-4 font-bold">{emp.name}</td>
                                                    <td className="p-4 text-blue-600">{emp.level}</td>
                                                    <td className="p-4 font-black">{emp.currentPoints}</td>
                                                    <td className="p-4 text-right">
                                                        <button onClick={() => {setEditingEmp({...emp}); setIsAddingNew(false);}} className="text-blue-500 mr-2">編輯</button>
                                                        <button onClick={() => setEmployees(employees.filter(e => e.id !== emp.id))} className="text-red-400">刪除</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 驗證視窗 */}
                    {authMode && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-sm text-center">
                                <Icon name="Lock" size={48} className="mx-auto mb-4 text-gray-300" />
                                <h3 className="text-xl font-black mb-6">身份驗證</h3>
                                <input type="password" autoFocus value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAuth()} className="w-full text-center text-4xl py-4 bg-gray-50 border-2 rounded-2xl mb-6 font-black outline-none" />
                                <div className="flex gap-2">
                                    <button onClick={() => setAuthMode(null)} className="flex-1 py-3 font-bold text-gray-400">取消</button>
                                    <button onClick={handleAuth} className="flex-1 py-3 bg-gray-900 text-white font-bold rounded-xl">確認</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 編輯 Modal */}
                    {editingEmp && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[1000] flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-3xl w-full max-w-xl my-auto p-6 space-y-4 shadow-2xl">
                                <div className="flex justify-between items-center border-b pb-4">
                                    <h3 className="text-xl font-black">{isAddingNew ? '註冊新夥伴' : '編輯資料'}</h3>
                                    <button onClick={() => setEditingEmp(null)}><Icon name="X" /></button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="姓名" value={editingEmp.name} onChange={e => setEditingEmp({...editingEmp, name: e.target.value})} className="p-3 border rounded-xl font-bold" />
                                    <input placeholder="門市" value={editingEmp.shop} onChange={e => setEditingEmp({...editingEmp, shop: e.target.value})} className="p-3 border rounded-xl font-bold" />
                                    <input type="date" value={editingEmp.startDate} onChange={e => setEditingEmp({...editingEmp, startDate: e.target.value})} className="p-3 border rounded-xl font-bold" />
                                    <select value={editingEmp.skillsPassed} onChange={e => {
                                        const skills = parseInt(e.target.value);
                                        const {level, defaultMult} = getLevelAndMultiplierBySkills(skills);
                                        setEditingEmp({...editingEmp, skillsPassed: skills, level, multiplier: defaultMult});
                                    }} className="p-3 border rounded-xl font-bold">
                                        <option value="0">0 關</option>
                                        <option value="1">1 關</option>
                                        <option value="2">2 關 (熟練)</option>
                                        <option value="3">3 關 (全能)</option>
                                    </select>
                                </div>
                                <div className="flex items-center justify-between p-4 bg-orange-50 rounded-2xl">
                                    <label className="font-bold text-orange-800 text-sm">去年績效警示 (A/B權限)</label>
                                    <input type="checkbox" checked={editingEmp.lastYearLow} onChange={e => setEditingEmp({...editingEmp, lastYearLow: e.target.checked})} className="w-6 h-6" />
                                </div>
                                <button onClick={handleSaveEmpEdit} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">儲存更新</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
