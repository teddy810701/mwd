<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>績效考核系統</title>
    <!-- 載入 React 與 Babel (用於即時解析 JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 模擬 Lucide Icon 元件
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // --- 初始資料與配置 ---
            const DEFAULT_INITIAL_POINTS = 600;
            const GLOBAL_BASE_BONUS = 600; 

            const PERFORMANCE_ITEMS = {
                penalty: [
                    { label: '遲到 (預設1分/可修改)', val: -1 },
                    { label: '延遲開工 (15分以上)', val: -10 },
                    { label: '工作態度不佳 (不服管教)', val: -5 },
                    { label: '作業失誤-輕 (漏餐具等)', val: -2 },
                    { label: '作業失誤-重 (燒焦/客訴)', val: -5 },
                    { label: '環境責任 (收班不確實)', val: -3 },
                    { label: '服儀不整', val: -2 },
                    { label: '其他扣分事項', val: -1 }
                ],
                bonus: [
                    { label: '申請打掃環境', val: 2 },
                    { label: '支援另一間店', val: 1 },
                    { label: '獲得顧客五星評論', val: 2 },
                    { label: '表現優異 (店長推薦)', val: 5 },
                    { label: '其他加分事項', val: 1 }
                ]
            };

            const [employees, setEmployees] = useState([
                { id: 1, name: '王小明', shop: '西螺文昌店', startDate: '2023-03-28', level: '全能夥伴', skillsPassed: 3, initialPoints: 600, currentPoints: 585, multiplier: 1.4, lastYearLow: false },
                { id: 2, name: '李小華', shop: '斗南站前店', startDate: '2025-03-28', level: '熟練夥伴', skillsPassed: 2, initialPoints: 600, currentPoints: 495, multiplier: 1.1, lastYearLow: false }
            ]);

            const [activeTab, setActiveTab] = useState('employee'); 
            const [selectedEmpId, setSelectedEmpId] = useState(1);
            const [logs, setLogs] = useState([
                { id: 101, empId: 1, occurrenceDate: '2024-01-10', name: '王小明', amount: 5, reason: '表現優異', note: '環境整理非常到位', operator: '店長', timestamp: '2024-01-10 10:00' },
                { id: 102, empId: 1, occurrenceDate: '2024-02-05', name: '王小明', amount: -20, reason: '遲到', note: '遲到20分鐘', operator: '店長', timestamp: '2024-02-05 08:30' }
            ]);
            
            const [authMode, setAuthMode] = useState(null); 
            const [passwordInput, setPasswordInput] = useState('');
            const [selectedItemLabel, setSelectedItemLabel] = useState('');
            const [customPoints, setCustomPoints] = useState(0);
            const [occurrenceDate, setOccurrenceDate] = useState(new Date().toISOString().split('T')[0]);
            const [note, setNote] = useState(''); 
            const [systemMessage, setSystemMessage] = useState(null);
            const [editingEmp, setEditingEmp] = useState(null); 
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [deletingEmpId, setDeletingEmpId] = useState(null); 

            const showMessage = (text, type = 'info') => {
                setSystemMessage({ text, type });
                setTimeout(() => setSystemMessage(null), 3000);
            };

            const calculateSeniority = (startDate) => {
                if (!startDate) return { years: 0, months: 0, isEligible: false, text: '未設定' };
                const start = new Date(startDate);
                const now = new Date();
                let years = now.getFullYear() - start.getFullYear();
                const anniversaryThisYear = new Date(start);
                anniversaryThisYear.setFullYear(now.getFullYear());
                if (now < anniversaryThisYear) years--;
                let months = now.getMonth() - start.getMonth();
                if (now.getDate() < start.getDate()) months--;
                if (months < 0) months += 12;
                return { years: Math.max(0, years), months: Math.max(0, months), isEligible: years >= 1, text: `${Math.max(0, years)}年${Math.max(0, months)}個月` };
            };

            const getLevelAndMultiplierBySkills = (skills) => {
                if (skills >= 3) return { level: '全能夥伴', minMult: 1.3, maxMult: 1.5, defaultMult: 1.4 };
                if (skills === 2) return { level: '熟練夥伴', minMult: 1.0, maxMult: 1.3, defaultMult: 1.1 };
                return { level: '一般夥伴', minMult: 0, maxMult: 0, defaultMult: 0 };
            };

            const calculateResult = (points, lastYearLow) => {
                if (lastYearLow && points < 499) return { status: 'D (淘汰)', color: 'text-black font-black', bg: 'bg-black text-white', desc: '解除合作' };
                if (points >= 500) return { status: 'A (合格)', color: 'text-green-600', bg: 'bg-green-100 text-green-800', desc: '正常發放' };
                if (points >= 481) return { status: 'B (警示)', color: 'text-orange-600', bg: 'bg-yellow-100 text-yellow-800', desc: '金額減半' };
                return { status: 'C (重罰)', color: 'text-red-600', bg: 'bg-red-100 text-red-800', desc: '取消資格' };
            };

            const calculateFinalPay = (emp) => {
                if (!emp || emp.skillsPassed < 2) return 0; 
                const seniority = calculateSeniority(emp.startDate);
                if (!seniority.isEligible) return 0;
                const res = calculateResult(emp.currentPoints, emp.lastYearLow);
                const base = GLOBAL_BASE_BONUS * emp.multiplier;
                if (res.status.includes('A')) return Math.round(base);
                if (res.status.includes('B')) return Math.round(base / 2);
                return 0;
            };

            const handlePointChange = (empId, amount, reason, operator = '店長') => {
                const targetEmp = employees.find(e => e.id === empId);
                if (!targetEmp) return;
                setEmployees(prev => prev.map(emp => emp.id === empId ? { ...emp, currentPoints: emp.currentPoints + amount } : emp));
                setLogs(prev => [{ id: Date.now(), empId, occurrenceDate, name: targetEmp.name, amount, reason, note, operator, timestamp: new Date().toLocaleString() }, ...prev]);
                setNote(''); setSelectedItemLabel(''); setCustomPoints(0);
                showMessage(`${targetEmp.name} 分數已變動`, 'success');
            };

            const handleSaveEmpEdit = () => {
                if (isAddingNew) {
                    setEmployees(prev => [...prev, editingEmp]);
                    showMessage('新增成功', 'success');
                } else {
                    setEmployees(prev => prev.map(emp => emp.id === editingEmp.id ? editingEmp : emp));
                    showMessage('更新成功', 'success');
                }
                setEditingEmp(null); setIsAddingNew(false);
            };

            const handleAuth = () => {
                if (authMode === 'manager' && passwordInput === '8888') { setActiveTab('manager'); setAuthMode(null); setPasswordInput(''); }
                else if (authMode === 'admin' && passwordInput === '9999') { setActiveTab('admin'); setAuthMode(null); setPasswordInput(''); }
                else { setPasswordInput(''); showMessage('密碼錯誤', 'error'); }
            };

            const selectedEmp = employees.find(e => e.id === selectedEmpId) || employees[0];
            const filteredPersonalLogs = logs.filter(log => log.empId === selectedEmp?.id);

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    {systemMessage && (
                        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-full shadow-2xl font-bold animate-bounce ${systemMessage.type === 'error' ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`}>
                            {systemMessage.text}
                        </div>
                    )}

                    <nav className="bg-white border-b sticky top-0 z-10 shadow-sm p-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold text-orange-600 flex items-center gap-2"><Icon name="shield-check" size={24} /> 績效系統</h1>
                            <div className="flex bg-gray-100 p-1 rounded-xl gap-1">
                                <button onClick={() => setActiveTab('employee')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${activeTab === 'employee' ? 'bg-white shadow text-orange-600' : 'text-gray-500'}`}>查詢</button>
                                <button onClick={() => setAuthMode('manager')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${activeTab === 'manager' ? 'bg-orange-600 text-white' : 'text-gray-500'}`}>店長</button>
                                <button onClick={() => setAuthMode('admin')} className={`px-3 py-1.5 rounded-lg text-xs font-black ${activeTab === 'admin' ? 'bg-red-600 text-white' : 'text-gray-500'}`}><Icon name="lock" size={14}/></button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto p-4">
                        {activeTab === 'employee' && selectedEmp && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-3xl shadow-xl overflow-hidden border">
                                    <div className="bg-gradient-to-br from-orange-500 to-orange-600 p-8 text-white text-center">
                                        <p className="text-xs font-bold opacity-80 mb-2">{selectedEmp.shop} | {selectedEmp.level}</p>
                                        <h2 className="text-4xl font-black mb-4">{selectedEmp.name}</h2>
                                        <p className="text-sm font-bold">到職日：{selectedEmp.startDate}</p>
                                    </div>
                                    <div className="p-6 grid grid-cols-2 gap-4">
                                        <div className="bg-gray-50 p-4 rounded-2xl text-center border">
                                            <p className="text-[10px] text-gray-400 font-bold mb-1">年度累積積分</p>
                                            <p className="text-3xl font-black text-gray-700">{selectedEmp.currentPoints}</p>
                                        </div>
                                        <div className="bg-orange-50 p-4 rounded-2xl text-center border border-orange-100">
                                            <p className="text-[10px] text-orange-400 font-bold mb-1">預計年度獎勵</p>
                                            <p className="text-3xl font-black text-orange-600">${calculateFinalPay(selectedEmp)}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 border shadow-sm">
                                    <h3 className="font-black text-gray-800 mb-4 flex items-center gap-2"><Icon name="history" className="text-orange-500" /> 積分變動明細</h3>
                                    <div className="space-y-3">
                                        {filteredPersonalLogs.map(log => (
                                            <div key={log.id} className="flex justify-between items-center p-4 border rounded-2xl bg-white">
                                                <div>
                                                    <p className="text-[10px] font-bold text-gray-400">{log.occurrenceDate}</p>
                                                    <p className="font-bold text-gray-700">{log.reason}</p>
                                                </div>
                                                <div className={`text-xl font-black ${log.amount >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                                    {log.amount > 0 ? '+' : ''}{log.amount}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'manager' && (
                            <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2"><Icon name="store" size={20} /> 店長評分</h2>
                                <select onChange={(e) => setSelectedEmpId(parseInt(e.target.value))} className="w-full p-3 border-2 rounded-xl mb-4 font-bold">
                                    {employees.map(e => <option key={e.id} value={e.id}>{e.name} ({e.shop})</option>)}
                                </select>
                                <select onChange={(e) => {
                                    setSelectedItemLabel(e.target.value);
                                    const all = [...PERFORMANCE_ITEMS.penalty, ...PERFORMANCE_ITEMS.bonus];
                                    const item = all.find(i => i.label === e.target.value);
                                    if(item) setCustomPoints(item.val);
                                }} className="w-full p-3 border-2 rounded-xl mb-4 font-bold">
                                    <option value="">選擇項目...</option>
                                    {PERFORMANCE_ITEMS.penalty.map(i => <option key={i.label} value={i.label}>🔴 {i.label}</option>)}
                                    {PERFORMANCE_ITEMS.bonus.map(i => <option key={i.label} value={i.label}>🟢 {i.label}</option>)}
                                </select>
                                <textarea placeholder="備註..." value={note} onChange={(e) => setNote(e.target.value)} className="w-full p-3 border-2 rounded-xl h-24 mb-4" />
                                <button onClick={() => handlePointChange(selectedEmpId, customPoints, selectedItemLabel)} className="w-full py-4 bg-orange-600 text-white rounded-2xl font-black">提交評分</button>
                            </div>
                        )}
                        
                        {activeTab === 'admin' && (
                            <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                                <div className="p-4 bg-red-600 text-white flex justify-between items-center">
                                    <span className="font-bold">夥伴管理</span>
                                    <button onClick={() => { setIsAddingNew(true); setEditingEmp({ id: Date.now(), name: '', shop: '', startDate: '', level: '一般夥伴', skillsPassed: 0, initialPoints: 600, currentPoints: 600, multiplier: 0, lastYearLow: false }); }} className="bg-white text-red-600 px-3 py-1 rounded-lg text-xs font-bold">新增夥伴</button>
                                </div>
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-50 border-b">
                                        <tr>
                                            <th className="p-4">姓名</th>
                                            <th className="p-4">積分</th>
                                            <th className="p-4">等級</th>
                                            <th className="p-4 text-right">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {employees.map(emp => (
                                            <tr key={emp.id} className="border-b">
                                                <td className="p-4 font-bold">{emp.name}</td>
                                                <td className="p-4">{emp.currentPoints}</td>
                                                <td className="p-4 text-blue-600 font-bold">{emp.level}</td>
                                                <td className="p-4 text-right">
                                                    <button onClick={() => { setEditingEmp(emp); setIsAddingNew(false); }} className="text-blue-500 mr-2"><Icon name="edit-3" size={16}/></button>
                                                    <button onClick={() => setEmployees(employees.filter(e => e.id !== emp.id))} className="text-red-500"><Icon name="trash-2" size={16}/></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {authMode && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                                <h3 className="text-xl font-black mb-6">驗證密碼</h3>
                                <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full text-center text-3xl py-3 border-2 rounded-2xl mb-6 font-black" autoFocus />
                                <div className="flex gap-4">
                                    <button onClick={() => setAuthMode(null)} className="flex-1 font-bold text-gray-400">取消</button>
                                    <button onClick={handleAuth} className="flex-1 bg-gray-900 text-white py-3 rounded-xl font-bold">確認</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
