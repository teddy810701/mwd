<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐飲夥伴績效考核系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .log-entry { transition: all 0.2s ease; }
        .log-entry:active { transform: scale(0.98); background-color: #f3f4f6; }

        .tab-content { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const STORAGE_KEY_EMP = '考核系統_員工_V6';
            const STORAGE_KEY_LOGS = '考核系統_紀錄_V6';

            const PERFORMANCE_ITEMS = {
                penalty: [
                    { label: '遲到 (每分鐘-1)', val: -1 },
                    { label: '延遲開工 (15分以上)', val: -10 },
                    { label: '工作態度不佳 (不服管教)', val: -5 },
                    { label: '作業失誤-輕 (漏餐具等)', val: -2 },
                    { label: '作業失誤-重 (燒焦/客訴)', val: -5 },
                    { label: '環境責任 (收班不確實)', val: -3 },
                    { label: '服儀不整', val: -2 },
                    { label: '其他扣分事項', val: -1 }
                ],
                bonus: [
                    { label: '申請打掃環境', val: 2 },
                    { label: '支援另一間店', val: 1 },
                    { label: '獲得顧客五星評論', val: 2 },
                    { label: '表現優異 (店長推薦)', val: 5 },
                    { label: '其他加分事項', val: 1 }
                ]
            };

            const [employees, setEmployees] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY_EMP);
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: '王小明', shop: '西螺文昌店', startDate: '2022-01-01', currentPoints: 600, multiplier: 1.3, skillsPassed: 3 },
                    { id: 2, name: '李小華', shop: '斗南站前店', startDate: '2023-06-15', currentPoints: 475, multiplier: 1.0, skillsPassed: 2 }
                ];
            });

            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY_LOGS);
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('employee');
            const [selectedEmpId, setSelectedEmpId] = useState(1);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [authMode, setAuthMode] = useState(null);
            const [passwordInput, setPasswordInput] = useState('');
            const [selectedItemLabel, setSelectedItemLabel] = useState('');
            const [customPoints, setCustomPoints] = useState(0);
            const [occurrenceDate, setOccurrenceDate] = useState(new Date().toISOString().split('T')[0]);
            const [note, setNote] = useState('');
            const [systemMessage, setSystemMessage] = useState(null);
            const [editingEmp, setEditingEmp] = useState(null);
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [empToDelete, setEmpToDelete] = useState(null);
            const [logToDelete, setLogToDelete] = useState(null);
            
            // 管理頁面專用搜尋
            const [adminLogSearch, setAdminLogSearch] = useState('');

            useEffect(() => { localStorage.setItem(STORAGE_KEY_EMP, JSON.stringify(employees)); }, [employees]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY_LOGS, JSON.stringify(logs)); }, [logs]);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const showMessage = (text) => {
                setSystemMessage(text);
                setTimeout(() => setSystemMessage(null), 2500);
            };

            const calculateBenefits = (startDateStr) => {
                if (!startDateStr) return { skills: 1, mult: 0 };
                const start = new Date(startDateStr);
                const now = new Date();
                const years = (now - start) / (1000 * 60 * 60 * 24 * 365.25);
                if (years >= 2) return { skills: 3, mult: 1.3 };
                if (years >= 1) return { skills: 2, mult: 1.0 };
                return { skills: 1, mult: 0 };
            };

            const getPartnerLevel = (skills) => {
                if (skills >= 3) return "全能夥伴";
                if (skills === 2) return "熟練夥伴";
                return "一般夥伴";
            };

            const handleAddScore = () => {
                if (!selectedItemLabel || !note) { showMessage("⚠️ 請選擇項目並填寫原因"); return; }
                const scoreValue = Number(customPoints);
                if (isNaN(scoreValue)) { showMessage("⚠️ 分數必須為數字"); return; }
                
                const empId = selectedEmpId;
                setEmployees(prev => prev.map(e => e.id === empId ? { ...e, currentPoints: e.currentPoints + scoreValue } : e));
                setLogs(prev => [{ id: Date.now(), empId, occurrenceDate, amount: scoreValue, reason: selectedItemLabel, note }, ...prev]);
                
                setNote('');
                setSelectedItemLabel('');
                setCustomPoints(0);
                showMessage("✅ 評分成功！紀錄已同步至下方");
            };

            const handleDeleteLog = () => {
                if (!logToDelete) return;
                setEmployees(prev => prev.map(e => e.id === logToDelete.empId ? { ...e, currentPoints: e.currentPoints - logToDelete.amount } : e));
                setLogs(prev => prev.filter(l => l.id !== logToDelete.id));
                setLogToDelete(null);
                showMessage("🔄 紀錄已撤銷，分數已回退");
            };

            const selectedEmp = employees.find(e => e.id === selectedEmpId) || employees[0] || { name: '無成員', currentPoints: 0 };
            
            const filteredEmpLogs = useMemo(() => {
                return logs
                    .filter(l => l.empId === selectedEmpId && l.occurrenceDate.startsWith(selectedMonth))
                    .sort((a, b) => b.id - a.id);
            }, [logs, selectedEmpId, selectedMonth]);

            const recentManagerLogs = useMemo(() => {
                return [...logs].sort((a, b) => b.id - a.id).slice(0, 20);
            }, [logs]);

            // 管理員查看的全局過濾紀錄
            const allAdminLogs = useMemo(() => {
                return logs
                    .filter(l => {
                        const empName = getEmpName(l.empId);
                        return empName.includes(adminLogSearch) || l.reason.includes(adminLogSearch) || l.note.includes(adminLogSearch);
                    })
                    .sort((a, b) => b.id - a.id);
            }, [logs, adminLogSearch]);

            function getEmpName(id) { 
                return employees.find(e => e.id === id)?.name || "未知夥伴";
            }

            const monthOptions = useMemo(() => {
                const options = [];
                const d = new Date();
                for (let i = 0; i < 12; i++) {
                    const m = new Date(d.getFullYear(), d.getMonth() - i, 1);
                    options.push(m.toISOString().slice(0, 7));
                }
                return options;
            }, []);

            return (
                <div className="min-h-screen pb-20 bg-gray-50 text-[14px]">
                    <nav className="bg-white border-b sticky top-0 z-40 px-4 py-3 flex flex-col gap-3 shadow-sm md:flex-row md:justify-between md:items-center">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('employee')}>
                                <div className="w-9 h-9 bg-orange-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-orange-100">
                                    <Icon name="award" size={20} />
                                </div>
                                <span className="font-black text-xl tracking-tight text-gray-800">績效考核</span>
                            </div>
                            <div className="md:hidden flex bg-gray-100 p-1 rounded-xl">
                                <button onClick={() => setActiveTab('employee')} className={`px-3 py-1.5 rounded-lg text-[11px] font-black transition-all ${activeTab === 'employee' ? 'bg-white shadow text-orange-600' : 'text-gray-400'}`}>查詢</button>
                                <button onClick={() => setAuthMode('manager')} className={`px-3 py-1.5 rounded-lg text-[11px] font-black transition-all ${activeTab === 'manager' ? 'bg-orange-600 text-white shadow' : 'text-gray-400'}`}>店長</button>
                                <button onClick={() => setAuthMode('admin')} className={`px-3 py-1.5 rounded-lg text-[11px] font-black transition-all ${activeTab === 'admin' ? 'bg-red-600 text-white shadow' : 'text-gray-400'}`}>管理</button>
                            </div>
                        </div>
                        <div className="hidden md:flex bg-gray-100 p-1 rounded-xl">
                            <button onClick={() => setActiveTab('employee')} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${activeTab === 'employee' ? 'bg-white shadow text-orange-600' : 'text-gray-400'}`}>查詢</button>
                            <button onClick={() => setAuthMode('manager')} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${activeTab === 'manager' ? 'bg-orange-600 text-white shadow' : 'text-gray-400'}`}>店長評分</button>
                            <button onClick={() => setAuthMode('admin')} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${activeTab === 'admin' ? 'bg-red-600 text-white shadow' : 'text-gray-400'}`}>後台管理</button>
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto p-4 space-y-6 tab-content">
                        {activeTab === 'employee' && (
                            <div className="space-y-4">
                                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                    {employees.map(e => (
                                        <button key={e.id} onClick={() => setSelectedEmpId(e.id)} className={`px-5 py-2.5 rounded-full whitespace-nowrap text-xs font-black border transition-all ${selectedEmpId === e.id ? 'bg-black text-white shadow-xl scale-105 border-black' : 'bg-white text-gray-400 border-gray-200'}`}>{e.name}</button>
                                    ))}
                                </div>
                                <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-2xl border border-gray-100">
                                    <div className="bg-gradient-to-br from-orange-500 to-red-600 p-10 text-white text-center relative">
                                        <div className="absolute top-4 right-4 opacity-20"><Icon name="user" size={60} /></div>
                                        <div className="text-xs font-black opacity-80 mb-1 uppercase tracking-widest">{selectedEmp.shop}</div>
                                        <div className="text-sm font-bold bg-white/20 inline-block px-4 py-1 rounded-full mb-3 backdrop-blur-sm">{getPartnerLevel(selectedEmp.skillsPassed)}</div>
                                        <div className="text-4xl font-black mb-1">{selectedEmp.name}</div>
                                        <div className="text-[11px] font-bold opacity-60">當前累積總積分</div>
                                    </div>
                                    <div className="p-8 grid grid-cols-2 gap-4">
                                        <div className="bg-gray-50 p-6 rounded-3xl text-center border border-gray-100">
                                            <div className="text-[11px] font-black text-gray-400 mb-2 uppercase tracking-tighter">總積分</div>
                                            <div className="text-4xl font-black text-gray-800">{selectedEmp.currentPoints}</div>
                                        </div>
                                        <div className="bg-orange-50 p-6 rounded-3xl text-center border border-orange-100">
                                            <div className="text-[11px] font-black text-orange-400 mb-2 uppercase tracking-tighter">預估獎金</div>
                                            <div className="text-4xl font-black text-orange-600">
                                                ${selectedEmp.multiplier === 0 
                                                    ? 0 
                                                    : Math.round(600 * (selectedEmp.multiplier || 0) * (selectedEmp.currentPoints >= 481 ? (selectedEmp.currentPoints >= 500 ? 1 : 0.5) : 0))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="px-10 pb-6 text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                                        加權倍率: {selectedEmp.multiplier}x / 職能級別: {selectedEmp.skillsPassed}關
                                    </div>
                                </div>

                                <section className="bg-white p-6 rounded-[2.5rem] shadow-lg border border-gray-100 mt-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-black text-lg flex items-center gap-2 text-gray-800 px-1"><Icon name="calendar-search" className="text-orange-500" /> 月度明細</h3>
                                        <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-gray-100 px-3 py-2 rounded-xl text-xs font-black text-gray-600 border-none outline-none">
                                            {monthOptions.map(m => <option key={m} value={m}>{m.replace('-', '年')}月</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-3">
                                        {filteredEmpLogs.length > 0 ? filteredEmpLogs.map(l => (
                                            <div key={l.id} className="p-4 bg-gray-50 rounded-2xl flex justify-between items-start border border-gray-100">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className={`text-[10px] font-black px-2 py-0.5 rounded-full border ${l.amount < 0 ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-600 border-green-100'}`}>
                                                            {l.amount > 0 ? `+${l.amount}` : l.amount}分
                                                        </span>
                                                        <span className="text-[10px] text-gray-400 font-bold uppercase">{l.occurrenceDate}</span>
                                                    </div>
                                                    <div className="text-xs font-black text-gray-700">{l.reason}</div>
                                                    {l.note && <div className="text-[11px] text-gray-400 mt-1 italic">「{l.note}」</div>}
                                                </div>
                                            </div>
                                        )) : <div className="text-center py-10 opacity-30 italic font-black text-gray-400">尚無評分紀錄</div>}
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'manager' && (
                            <div className="space-y-6">
                                <section className="space-y-3">
                                    <h3 className="font-black text-xs text-gray-400 flex items-center gap-1 uppercase tracking-widest ml-1"><Icon name="activity" size={14} /> 即時夥伴戰報</h3>
                                    <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide px-1">
                                        {employees.map(e => (
                                            <div key={e.id} onClick={() => setSelectedEmpId(e.id)} className={`min-w-[140px] p-4 rounded-3xl border-2 transition-all cursor-pointer ${selectedEmpId === e.id ? 'bg-white border-orange-500 shadow-lg scale-105' : 'bg-gray-100/50 border-transparent text-gray-400'}`}>
                                                <div className="font-black text-sm mb-1 text-gray-800">{e.name}</div>
                                                <div className={`text-xl font-black mb-2 ${e.currentPoints >= 500 ? 'text-green-500' : e.currentPoints >= 481 ? 'text-orange-500' : 'text-gray-800'}`}>{e.currentPoints} <span className="text-[10px] opacity-50">分</span></div>
                                                <div className="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden">
                                                    <div className={`h-full rounded-full ${e.currentPoints >= 500 ? 'bg-green-500' : 'bg-orange-500'}`} style={{ width: `${Math.min((e.currentPoints / 500) * 100, 100)}%` }}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-orange-50">
                                    <div className="flex justify-between items-center mb-6 px-1">
                                        <h2 className="font-black text-xl flex items-center gap-2 text-orange-600"><Icon name="edit-3" />評分：{selectedEmp.name}</h2>
                                        <input type="date" value={occurrenceDate} onChange={e => setOccurrenceDate(e.target.value)} className="text-[10px] font-black bg-gray-50 p-2 rounded-xl text-gray-500 outline-none border-none" />
                                    </div>
                                    <div className="space-y-4">
                                        <select value={selectedItemLabel} onChange={e => {
                                            setSelectedItemLabel(e.target.value);
                                            const item = [...PERFORMANCE_ITEMS.penalty, ...PERFORMANCE_ITEMS.bonus].find(i => i.label === e.target.value);
                                            if (item) setCustomPoints(item.val);
                                        }} className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-black text-sm outline-none focus:border-orange-500 appearance-none">
                                            <option value="">-- 請選擇考核項目 --</option>
                                            <optgroup label="🔴 扣分項目">
                                                {PERFORMANCE_ITEMS.penalty.map(i => <option key={i.label} value={i.label}>{i.label}</option>)}
                                            </optgroup>
                                            <optgroup label="🟢 加分項目">
                                                {PERFORMANCE_ITEMS.bonus.map(i => <option key={i.label} value={i.label}>{i.label}</option>)}
                                            </optgroup>
                                        </select>
                                        
                                        {selectedItemLabel && (
                                            <div className="p-4 bg-orange-50/50 rounded-2xl border border-orange-100 animate-in fade-in slide-in-from-top-2">
                                                <label className="text-[10px] font-black text-orange-400 uppercase block mb-3 text-center">調整分數 (預設：{PERFORMANCE_ITEMS.penalty.concat(PERFORMANCE_ITEMS.bonus).find(i => i.label === selectedItemLabel)?.val})</label>
                                                <div className="flex items-center justify-center gap-2 sm:gap-4">
                                                    <button onClick={() => setCustomPoints(prev => prev - 1)} className="w-12 h-12 flex-shrink-0 bg-white border border-orange-200 rounded-xl flex items-center justify-center text-orange-600 shadow-sm active:bg-orange-500 active:text-white transition-all">
                                                        <Icon name="minus" size={20}/>
                                                    </button>
                                                    <div className="relative flex-1 max-w-[100px]">
                                                        <input 
                                                            type="number" 
                                                            value={customPoints} 
                                                            onChange={e => setCustomPoints(Number(e.target.value))} 
                                                            className="w-full bg-white border border-orange-200 rounded-xl py-3 text-center font-black text-xl text-orange-600 outline-none focus:ring-2 focus:ring-orange-500/20" 
                                                        />
                                                    </div>
                                                    <button onClick={() => setCustomPoints(prev => prev + 1)} className="w-12 h-12 flex-shrink-0 bg-white border border-orange-200 rounded-xl flex items-center justify-center text-orange-600 shadow-sm active:bg-orange-500 active:text-white transition-all">
                                                        <Icon name="plus" size={20}/>
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        <textarea placeholder="具體備註原因 (必填)..." value={note} onChange={e => setNote(e.target.value)} className="w-full h-20 p-4 bg-gray-50 border border-gray-200 rounded-2xl font-bold text-sm outline-none focus:border-orange-500 transition-all resize-none" />
                                        <button onClick={handleAddScore} className="w-full py-5 bg-orange-600 text-white rounded-[2rem] font-black text-lg shadow-xl shadow-orange-100 active:scale-[0.98] transition-all">確認送出評分</button>
                                    </div>
                                </section>

                                <section className="bg-white p-6 rounded-[2.5rem] shadow-lg border border-gray-100">
                                    <div className="flex justify-between items-center mb-6 px-1">
                                        <h3 className="font-black text-lg flex items-center gap-2 text-gray-800"><Icon name="history" className="text-gray-400" /> 最近紀錄</h3>
                                        <span className="text-[10px] font-black text-gray-300 uppercase">最近 20 筆</span>
                                    </div>
                                    <div className="space-y-3">
                                        {recentManagerLogs.length > 0 ? recentManagerLogs.map(l => (
                                            <div key={l.id} className="p-4 bg-gray-50 rounded-2xl flex justify-between items-center border border-gray-100 log-entry group">
                                                <div className="flex-1 overflow-hidden">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-xs font-black text-gray-800">{getEmpName(l.empId)}</span>
                                                        <span className={`text-[10px] font-black px-2 py-0.5 rounded-full border ${l.amount < 0 ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-600 border-green-100'}`}>
                                                            {l.amount > 0 ? `+${l.amount}` : l.amount}
                                                        </span>
                                                        <span className="text-[10px] text-gray-400 font-bold">{l.occurrenceDate.split('-').slice(1).join('/')}</span>
                                                    </div>
                                                    <div className="text-[11px] font-bold text-gray-500 truncate">{l.reason} - {l.note}</div>
                                                </div>
                                                <button onClick={() => setLogToDelete(l)} className="p-2 text-gray-300 hover:text-red-500 transition-colors ml-2">
                                                    <Icon name="trash-2" size={16} />
                                                </button>
                                            </div>
                                        )) : (
                                            <div className="text-center py-10 text-gray-300 font-black italic">暫無紀錄</div>
                                        )}
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="space-y-6">
                                {/* 夥伴名單管理 */}
                                <section className="bg-white p-7 rounded-[2.5rem] shadow-xl border border-red-50">
                                    <div className="flex justify-between items-center mb-6 px-2">
                                        <h2 className="font-black text-xl flex items-center gap-2 text-red-600"><Icon name="users" />夥伴管理</h2>
                                        <button onClick={() => { setIsAddingNew(true); setEditingEmp({ id: Date.now(), name: '', shop: '西螺文昌店', startDate: new Date().toISOString().split('T')[0], skillsPassed: 1, currentPoints: 600, multiplier: 0 }); }} className="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-black hover:bg-red-700 transition-colors">+ 新增</button>
                                    </div>
                                    <div className="space-y-3">
                                        {employees.map(e => (
                                            <div key={e.id} className="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                                <div>
                                                    <div className="font-black text-gray-800 text-sm">{e.name}</div>
                                                    <div className="text-[10px] text-gray-400 font-bold uppercase">到職：{e.startDate} | {getPartnerLevel(e.skillsPassed)} ({e.multiplier}x)</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditingEmp(e); setIsAddingNew(false); }} className="p-2 text-blue-500 bg-white rounded-xl shadow-sm border border-gray-100 hover:bg-blue-50 transition-colors"><Icon name="edit" size={16}/></button>
                                                    <button onClick={() => setEmpToDelete(e)} className="p-2 text-red-400 bg-white rounded-xl shadow-sm border border-gray-100 hover:bg-red-50 transition-colors"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* 核心更新：店長操作歷程追蹤 (管理員全域視角) */}
                                <section className="bg-white p-7 rounded-[2.5rem] shadow-xl border border-gray-100">
                                    <div className="flex flex-col gap-4 mb-6 px-2">
                                        <div className="flex justify-between items-center">
                                            <h2 className="font-black text-xl flex items-center gap-2 text-gray-800"><Icon name="scroll-text" className="text-orange-500" /> 操作歷程稽核</h2>
                                            <span className="text-[10px] font-black bg-gray-100 px-3 py-1 rounded-full text-gray-400">TOTAL: {logs.length}</span>
                                        </div>
                                        <div className="relative">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                                <Icon name="search" size={14} />
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="搜尋夥伴、項目、或備註內容..." 
                                                value={adminLogSearch}
                                                onChange={e => setAdminLogSearch(e.target.value)}
                                                className="w-full pl-10 pr-4 py-3 bg-gray-50 border rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all"
                                            />
                                        </div>
                                    </div>

                                    <div className="space-y-3 max-h-[500px] overflow-y-auto pr-1 scrollbar-hide">
                                        {allAdminLogs.length > 0 ? allAdminLogs.map(l => (
                                            <div key={l.id} className="p-4 bg-gray-50/50 border rounded-2xl flex justify-between items-center group hover:bg-white hover:shadow-md transition-all">
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-1.5">
                                                        <span className="text-xs font-black text-gray-900 bg-gray-100 px-2 py-0.5 rounded-lg">{getEmpName(l.empId)}</span>
                                                        <span className={`text-[10px] font-black px-2 py-0.5 rounded-full border ${l.amount < 0 ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-600 border-green-100'}`}>
                                                            {l.amount > 0 ? `+${l.amount}` : l.amount}
                                                        </span>
                                                        <span className="text-[9px] text-gray-300 font-bold ml-auto">{l.occurrenceDate}</span>
                                                    </div>
                                                    <div className="text-[12px] font-black text-gray-600 flex items-center gap-1">
                                                        <Icon name="chevron-right" size={10} className="text-gray-300" />
                                                        {l.reason}
                                                    </div>
                                                    {l.note && (
                                                        <div className="mt-1 text-[11px] text-gray-400 italic bg-white/50 p-2 rounded-xl border border-gray-50">
                                                            "{l.note}"
                                                        </div>
                                                    )}
                                                </div>
                                                <button onClick={() => setLogToDelete(l)} className="p-3 text-gray-300 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100">
                                                    <Icon name="trash-2" size={18} />
                                                </button>
                                            </div>
                                        )) : (
                                            <div className="text-center py-20 bg-gray-50/50 rounded-3xl border-2 border-dashed border-gray-100">
                                                <Icon name="search-x" size={40} className="mx-auto text-gray-200 mb-2" />
                                                <div className="text-sm font-black text-gray-300 italic">找不到符合的紀錄</div>
                                            </div>
                                        )}
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {editingEmp && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-md overflow-y-auto">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl space-y-5 animate-in zoom-in duration-200 my-auto">
                                <h4 className="font-black text-center text-lg">{isAddingNew ? '✨ 註冊新夥伴' : '📝 修改夥伴檔案'}</h4>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 uppercase px-1">姓名</label>
                                        <input type="text" placeholder="姓名" value={editingEmp.name} onChange={e => setEditingEmp({...editingEmp, name: e.target.value})} className="w-full p-4 bg-gray-50 border rounded-2xl font-black outline-none focus:border-orange-500" />
                                    </div>
                                    
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 uppercase px-1">到職日 (手動選擇會自動更新下方建議)</label>
                                        <input type="date" value={editingEmp.startDate} onChange={e => {
                                            const date = e.target.value;
                                            const { skills, mult } = calculateBenefits(date);
                                            setEditingEmp({...editingEmp, startDate: date, skillsPassed: skills, multiplier: mult});
                                        }} className="w-full p-4 bg-gray-50 border rounded-2xl font-black outline-none focus:border-orange-500" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 uppercase px-1">通過關卡 (1-3)</label>
                                            <select 
                                                value={editingEmp.skillsPassed} 
                                                onChange={e => setEditingEmp({...editingEmp, skillsPassed: Number(e.target.value)})}
                                                className="w-full p-4 bg-gray-50 border rounded-2xl font-black outline-none focus:border-orange-500 appearance-none"
                                            >
                                                <option value={1}>1 關</option>
                                                <option value={2}>2 關</option>
                                                <option value={3}>3 關</option>
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 uppercase px-1">加權倍率</label>
                                            <input 
                                                type="number" 
                                                step="0.1"
                                                min="0"
                                                placeholder="1.0"
                                                value={editingEmp.multiplier} 
                                                onChange={e => setEditingEmp({...editingEmp, multiplier: parseFloat(e.target.value) || 0})} 
                                                className="w-full p-4 bg-gray-50 border rounded-2xl font-black outline-none focus:border-orange-500" 
                                            />
                                        </div>
                                    </div>

                                    <div className="bg-orange-50 p-4 rounded-3xl text-center border border-orange-100">
                                        <div className="text-[10px] font-black text-orange-300 uppercase mb-1">當前夥伴等級</div>
                                        <div className="text-sm font-black text-orange-600">{getPartnerLevel(editingEmp.skillsPassed)} ({editingEmp.multiplier}x)</div>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setEditingEmp(null)} className="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-black hover:bg-gray-200 transition-colors">取消</button>
                                    <button onClick={() => {
                                        if (!editingEmp.name) { showMessage("⚠️ 請輸入姓名"); return; }
                                        if (isAddingNew) setEmployees(prev => [...prev, editingEmp]);
                                        else setEmployees(prev => prev.map(e => e.id === editingEmp.id ? editingEmp : e));
                                        setEditingEmp(null);
                                        showMessage('🎉 已成功儲存夥伴資料');
                                    }} className="flex-2 py-4 bg-black text-white rounded-2xl font-black hover:bg-gray-800 transition-colors">儲存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {authMode && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/70 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-10 shadow-2xl text-center animate-in zoom-in duration-200">
                                <h4 className="font-black mb-6 text-gray-800 uppercase text-xs tracking-widest">身分驗證</h4>
                                <input autoFocus type="password" placeholder="••••" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full bg-gray-50 border-2 rounded-2xl px-4 py-5 font-black text-center text-3xl mb-8 outline-none tracking-[0.5em] focus:border-orange-500" />
                                <div className="flex gap-3">
                                    <button onClick={() => { setAuthMode(null); setPasswordInput(''); }} className="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-black">返回</button>
                                    <button onClick={() => {
                                        if (passwordInput === (authMode === 'manager' ? '8888' : '9999')) { setActiveTab(authMode); setAuthMode(null); setPasswordInput(''); } 
                                        else showMessage("❌ 密碼錯誤");
                                    }} className="flex-2 py-4 bg-black text-white rounded-2xl font-black">登入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {logToDelete && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl animate-in zoom-in duration-200">
                                <Icon name="alert-triangle" size={48} className="text-red-500 mx-auto mb-4" />
                                <h4 className="font-black mb-2 text-lg">確定撤銷評分？</h4>
                                <p className="text-xs text-gray-400 mb-6 font-bold">撤銷後「{getEmpName(logToDelete.empId)}」的分數會回退 {logToDelete.amount > 0 ? `-${logToDelete.amount}` : `+${Math.abs(logToDelete.amount)}`} 分</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setLogToDelete(null)} className="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-black">取消</button>
                                    <button onClick={handleDeleteLog} className="flex-2 py-4 bg-red-600 text-white rounded-2xl font-black shadow-lg shadow-red-100 hover:bg-red-700 transition-colors">確定撤銷</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {empToDelete && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl animate-in zoom-in duration-200">
                                <Icon name="user-x" size={48} className="text-red-500 mx-auto mb-4" />
                                <h4 className="font-black mb-2 text-lg">確定刪除夥伴？</h4>
                                <p className="text-xs text-gray-400 mb-6 font-bold">這將會移除「{empToDelete.name}」的所有績效數據，且無法還原。</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setEmpToDelete(null)} className="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-black">取消</button>
                                    <button onClick={() => {
                                        setEmployees(prev => prev.filter(e => e.id !== empToDelete.id));
                                        setLogs(prev => prev.filter(l => l.empId !== empToDelete.id));
                                        setEmpToDelete(null);
                                        showMessage("🗑️ 夥伴資料已移除");
                                    }} className="flex-2 py-4 bg-red-600 text-white rounded-2xl font-black shadow-lg shadow-red-100">確定刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {systemMessage && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1000] bg-gray-900/90 backdrop-blur-md text-white px-8 py-3 rounded-full font-black text-xs shadow-2xl animate-in fade-in zoom-in duration-300">
                            {systemMessage}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
