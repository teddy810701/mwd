<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐飲夥伴績效考核系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .del-btn-final {
            background-color: #fee2e2;
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .del-btn-final:active {
            background-color: #ef4444;
            color: white;
            transform: scale(0.9);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const STORAGE_KEY_EMP = '考核系統_員工_V4';
            const STORAGE_KEY_LOGS = '考核系統_紀錄_V4';

            const PERFORMANCE_ITEMS = {
                penalty: [
                    { label: '遲到 (預設1分/可修改)', val: -1 },
                    { label: '延遲開工 (15分以上)', val: -10 },
                    { label: '工作態度不佳 (不服管教)', val: -5 },
                    { label: '作業失誤-輕 (漏餐具等)', val: -2 },
                    { label: '作業失誤-重 (燒焦/客訴)', val: -5 },
                    { label: '環境責任 (收班不確實)', val: -3 },
                    { label: '服儀不整', val: -2 },
                    { label: '其他扣分事項', val: -1 }
                ],
                bonus: [
                    { label: '申請打掃環境', val: 2 },
                    { label: '支援另一間店', val: 1 },
                    { label: '獲得顧客五星評論', val: 2 },
                    { label: '表現優異 (店長推薦)', val: 5 },
                    { label: '其他加分事項', val: 1 }
                ]
            };

            const [employees, setEmployees] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY_EMP);
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: '王小明', shop: '西螺文昌店', startDate: '2023-03-28', currentPoints: 600, multiplier: 1.3, skillsPassed: 3 },
                    { id: 2, name: '李小華', shop: '斗南站前店', startDate: '2024-05-15', currentPoints: 600, multiplier: 0, skillsPassed: 1 }
                ];
            });

            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY_LOGS);
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('employee');
            const [selectedEmpId, setSelectedEmpId] = useState(1);
            const [authMode, setAuthMode] = useState(null);
            const [passwordInput, setPasswordInput] = useState('');
            const [selectedItemLabel, setSelectedItemLabel] = useState('');
            const [customPoints, setCustomPoints] = useState(0);
            const [occurrenceDate, setOccurrenceDate] = useState(new Date().toISOString().split('T')[0]);
            const [note, setNote] = useState('');
            const [systemMessage, setSystemMessage] = useState(null);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().substring(0, 7));
            const [editingEmp, setEditingEmp] = useState(null);
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [deleteConfirmLog, setDeleteConfirmLog] = useState(null);
            const [empToDelete, setEmpToDelete] = useState(null);

            useEffect(() => { localStorage.setItem(STORAGE_KEY_EMP, JSON.stringify(employees)); }, [employees]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY_LOGS, JSON.stringify(logs)); }, [logs]);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const showMessage = (text) => {
                setSystemMessage(text);
                setTimeout(() => setSystemMessage(null), 2500);
            };

            const autoCalculateMultiplier = (skills) => {
                if (skills >= 3) return 1.3;
                if (skills === 2) return 1.0;
                return 0;
            };

            const getPartnerLevel = (skills) => {
                if (skills >= 3) return "全能夥伴";
                if (skills === 2) return "熟練夥伴";
                return "一般夥伴";
            };

            const calculateSeniority = (startDate) => {
                if (!startDate) return { text: '未知', isEligible: false };
                const start = new Date(startDate);
                const now = new Date();
                let years = now.getFullYear() - start.getFullYear();
                let months = now.getMonth() - start.getMonth();
                if (now.getDate() < start.getDate()) months--;
                if (months < 0) { years--; months += 12; }
                return { text: `${years}年${months}個月`, isEligible: years >= 1 };
            };

            const handleAddScore = () => {
                if (!selectedItemLabel || !note) { showMessage("請填寫項目與備註"); return; }
                const scoreValue = customPoints;
                const empId = selectedEmpId;

                setEmployees(prev => prev.map(e => e.id === empId ? { ...e, currentPoints: e.currentPoints + scoreValue } : e));
                setLogs(prev => [{ id: Date.now(), empId, occurrenceDate, amount: scoreValue, reason: selectedItemLabel, note }, ...prev]);
                
                setNote('');
                setSelectedItemLabel('');
                setCustomPoints(0);
                showMessage("評分成功！");
            };

            const confirmDeleteLogAction = () => {
                if (!deleteConfirmLog) return;
                const targetLog = deleteConfirmLog;
                setLogs(prev => prev.filter(l => l.id !== targetLog.id));
                setEmployees(prev => prev.map(e => e.id === targetLog.empId ? { ...e, currentPoints: e.currentPoints - targetLog.amount } : e));
                setDeleteConfirmLog(null);
                showMessage("紀錄已撤銷，分數已補回");
            };

            const confirmDeleteEmpAction = () => {
                if (!empToDelete) return;
                setEmployees(prev => prev.filter(e => e.id !== empToDelete.id));
                setLogs(prev => prev.filter(l => l.empId !== empToDelete.id));
                setEmpToDelete(null);
                showMessage(`已移除夥伴：${empToDelete.name}`);
            };

            const selectedEmp = employees.find(e => e.id === selectedEmpId) || employees[0] || { name: '無成員', shop: '', currentPoints: 0, multiplier: 0, skillsPassed: 0 };
            
            const filteredLogs = useMemo(() => {
                return logs
                    .filter(l => l.empId === selectedEmpId && l.occurrenceDate.startsWith(selectedMonth))
                    .sort((a, b) => new Date(b.occurrenceDate) - new Date(a.occurrenceDate));
            }, [logs, selectedEmpId, selectedMonth]);

            const allLogsHistory = useMemo(() => {
                return [...logs].sort((a, b) => b.id - a.id);
            }, [logs]);

            const getEmpName = (id) => employees.find(e => e.id === id)?.name || "未知夥伴";

            return (
                <div className="min-h-screen pb-20 bg-gray-50 text-[14px]">
                    <nav className="bg-white border-b sticky top-0 z-40 px-4 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('employee')}>
                            <div className="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center text-white"><Icon name="shield-check" /></div>
                            <span className="font-black text-lg">績效考核</span>
                        </div>
                        <div className="flex bg-gray-100 p-1 rounded-xl">
                            <button onClick={() => setActiveTab('employee')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${activeTab === 'employee' ? 'bg-white shadow text-orange-600' : 'text-gray-400'}`}>查詢</button>
                            <button onClick={() => setAuthMode('manager')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${activeTab === 'manager' ? 'bg-orange-600 text-white shadow' : 'text-gray-400'}`}>店長</button>
                            <button onClick={() => setAuthMode('admin')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${activeTab === 'admin' ? 'bg-red-600 text-white shadow' : 'text-gray-400'}`}>管理</button>
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        {activeTab === 'employee' && (
                            <div className="space-y-4">
                                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                    {employees.map(e => (
                                        <button key={e.id} onClick={() => setSelectedEmpId(e.id)} className={`px-4 py-2 rounded-full whitespace-nowrap text-xs font-black border transition ${selectedEmpId === e.id ? 'bg-black text-white shadow-md' : 'bg-white text-gray-400'}`}>{e.name}</button>
                                    ))}
                                </div>
                                <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border">
                                    <div className="bg-gradient-to-br from-orange-500 to-red-600 p-10 text-white text-center">
                                        <div className="text-xs font-black opacity-80 mb-1 uppercase tracking-widest">{selectedEmp.shop}</div>
                                        <div className="text-sm font-bold bg-white/20 inline-block px-3 py-0.5 rounded-full mb-3">{getPartnerLevel(selectedEmp.skillsPassed)}</div>
                                        <div className="text-4xl font-black">{selectedEmp.name}</div>
                                        <div className="text-[10px] font-bold opacity-60 mt-2 italic">年資：{calculateSeniority(selectedEmp.startDate).text} | 通過關卡：{selectedEmp.skillsPassed}</div>
                                    </div>
                                    <div className="p-8 grid grid-cols-2 gap-4">
                                        <div className="bg-gray-50 p-5 rounded-3xl text-center border">
                                            <div className="text-[10px] font-black text-gray-400 mb-1">目前積分</div>
                                            <div className="text-3xl font-black">{selectedEmp.currentPoints}</div>
                                        </div>
                                        <div className="bg-orange-50 p-5 rounded-3xl text-center border border-orange-100">
                                            <div className="text-[10px] font-black text-orange-400 mb-1">預估獎金 ({selectedEmp.multiplier}x)</div>
                                            <div className="text-3xl font-black text-orange-600">
                                                ${selectedEmp.multiplier === 0 ? "0" : Math.round(600 * selectedEmp.multiplier * (selectedEmp.currentPoints >= 500 ? 1 : (selectedEmp.currentPoints >= 481 ? 0.5 : 0)))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'manager' && (
                            <div className="space-y-6">
                                {/* 店長現在也可以管理夥伴名冊 */}
                                <section className="bg-white p-6 rounded-[2.5rem] shadow-lg border">
                                    <div className="flex justify-between items-center mb-6 px-2">
                                        <h2 className="font-black text-lg flex items-center gap-2 text-blue-600"><Icon name="users" />夥伴編輯與註冊</h2>
                                        <button onClick={() => { setIsAddingNew(true); setEditingEmp({ id: Date.now(), name: '', shop: '西螺文昌店', startDate: new Date().toISOString().split('T')[0], skillsPassed: 0, currentPoints: 600, multiplier: 0 }); }} className="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black">+ 註冊新夥伴</button>
                                    </div>
                                    <div className="space-y-3">
                                        {employees.map(e => (
                                            <div key={e.id} className="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-transparent hover:border-blue-100 transition-all">
                                                <div>
                                                    <div className="font-black text-gray-800 text-sm">{e.name} <span className="ml-2 text-[10px] px-2 py-0.5 bg-gray-200 rounded-full">{getPartnerLevel(e.skillsPassed)}</span></div>
                                                    <div className="text-[10px] text-gray-400 font-bold italic">{e.shop} | {e.startDate}</div>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => { setEditingEmp(e); setIsAddingNew(false); }} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors"><Icon name="edit" size={16}/></button>
                                                    <button onClick={() => setEmpToDelete(e)} className="p-2 text-red-400 hover:bg-red-50 rounded-lg transition-colors"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="bg-white p-8 rounded-[2.5rem] shadow-lg border">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="font-black text-xl flex items-center gap-2 text-orange-600"><Icon name="edit-3" />店長評分區</h2>
                                        <input type="date" value={occurrenceDate} onChange={e => setOccurrenceDate(e.target.value)} className="text-xs font-black bg-orange-50 text-orange-600 p-2 rounded-xl" />
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto mb-6 scrollbar-hide pb-2 border-b">
                                        {employees.map(e => (
                                            <button key={e.id} onClick={() => setSelectedEmpId(e.id)} className={`px-4 py-2 rounded-xl text-xs font-black border transition ${selectedEmpId === e.id ? 'border-orange-500 bg-orange-50 text-orange-600' : 'text-gray-300'}`}>{e.name}</button>
                                        ))}
                                    </div>
                                    <div className="space-y-5">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 ml-2">項目選擇</label>
                                            <select value={selectedItemLabel} onChange={e => {
                                                setSelectedItemLabel(e.target.value);
                                                const item = [...PERFORMANCE_ITEMS.penalty, ...PERFORMANCE_ITEMS.bonus].find(i => i.label === e.target.value);
                                                if (item) setCustomPoints(item.val);
                                            }} className="w-full p-4 bg-gray-50 border rounded-2xl font-black outline-none cursor-pointer text-sm">
                                                <option value="">選擇考核項目...</option>
                                                <optgroup label="🔴 扣分項目">
                                                    {PERFORMANCE_ITEMS.penalty.map(i => <option key={i.label} value={i.label}>{i.label} ({i.val})</option>)}
                                                </optgroup>
                                                <optgroup label="🟢 加分項目">
                                                    {PERFORMANCE_ITEMS.bonus.map(i => <option key={i.label} value={i.label}>{i.label} (+{i.val})</option>)}
                                                </optgroup>
                                            </select>
                                        </div>
                                        <div className="flex items-center gap-4 bg-orange-50 p-4 rounded-2xl border border-orange-100">
                                            <span className="text-xs font-black text-orange-400 uppercase">分值變動</span>
                                            <input type="number" value={customPoints} onChange={e => setCustomPoints(parseInt(e.target.value) || 0)} className="bg-transparent text-2xl font-black text-orange-600 outline-none w-full" />
                                        </div>
                                        <textarea placeholder="填寫評分詳細備註 (必填)..." value={note} onChange={e => setNote(e.target.value)} className="w-full h-24 p-4 bg-gray-50 border rounded-2xl font-bold outline-none focus:border-orange-400 text-sm" />
                                        <button onClick={handleAddScore} className="w-full py-5 bg-orange-600 text-white rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-all">確認提交評分</button>
                                    </div>
                                </section>
                            </div>
                        )}
                        
                        {activeTab === 'admin' && (
                            <div className="space-y-6">
                                <section className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                    <h2 className="font-black text-xl text-gray-800 mb-6 flex items-center gap-2"><Icon name="database" className="text-red-600" />全系統操作日誌</h2>
                                    <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2 scrollbar-hide">
                                        {allLogsHistory.length > 0 ? allLogsHistory.map(l => (
                                            <div key={l.id} className="p-4 bg-gray-50 rounded-2xl border border-gray-200">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-[10px] font-black px-2 py-0.5 bg-gray-200 text-gray-500 rounded uppercase">店長操作</span>
                                                    <span className="text-[10px] font-bold text-gray-400">{new Date(l.id).toLocaleString()}</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <div className={`text-xs font-black px-2 py-1 rounded ${l.amount < 0 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`}>
                                                        {l.amount > 0 ? `+${l.amount}` : l.amount}分
                                                    </div>
                                                    <div className="text-sm font-black">
                                                        <span className="text-blue-600">{getEmpName(l.empId)}</span>
                                                        <span className="mx-2 text-gray-300">|</span>
                                                        <span className="text-gray-700">{l.reason}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        )) : <div className="text-center py-20 text-gray-300 font-black italic">無任何歷史操作紀錄</div>}
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* 認證 Modal */}
                    {authMode && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
                                <h4 className="font-black mb-6">登入權限認證</h4>
                                <input autoFocus type="password" placeholder="密碼" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full bg-gray-50 border-2 rounded-2xl px-4 py-4 font-black text-center text-2xl mb-6 outline-none focus:border-orange-500 tracking-widest" />
                                <div className="flex gap-2">
                                    <button onClick={() => { setAuthMode(null); setPasswordInput(''); }} className="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-black">取消</button>
                                    <button onClick={() => {
                                        if (passwordInput === (authMode === 'manager' ? '8888' : '9999')) { setActiveTab(authMode); setAuthMode(null); setPasswordInput(''); } 
                                        else showMessage("密碼錯誤");
                                    }} className="flex-2 py-4 bg-black text-white rounded-2xl font-black">確認登入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 編輯/註冊 Modal */}
                    {editingEmp && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 backdrop-blur-md">
                            <div className="absolute inset-0 bg-black/40" onClick={() => setEditingEmp(null)}></div>
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 relative z-10 shadow-2xl space-y-4 border overflow-y-auto max-h-[90vh] scrollbar-hide text-[14px]">
                                <h4 className="font-black text-xl mb-4 text-center">{isAddingNew ? '註冊新夥伴' : '成員檔案管理'}</h4>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 ml-2">夥伴姓名</label>
                                        <input type="text" placeholder="輸入姓名" value={editingEmp.name} onChange={e => setEditingEmp({...editingEmp, name: e.target.value})} className="w-full p-4 bg-gray-50 border rounded-2xl font-bold outline-none focus:border-blue-500" />
                                    </div>
                                    
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 ml-2">到職日期</label>
                                        <input type="date" value={editingEmp.startDate} onChange={e => setEditingEmp({...editingEmp, startDate: e.target.value})} className="w-full p-4 bg-gray-50 border rounded-2xl font-bold outline-none focus:border-blue-500" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-blue-600 ml-2 italic">通過關卡數</label>
                                            <input 
                                                type="number" 
                                                min="0" max="10"
                                                value={editingEmp.skillsPassed} 
                                                onChange={e => {
                                                    const skills = parseInt(e.target.value) || 0;
                                                    setEditingEmp({ ...editingEmp, skillsPassed: skills, multiplier: autoCalculateMultiplier(skills) });
                                                }} 
                                                className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-black outline-none" 
                                            />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 ml-2">獎金倍率</label>
                                            <input type="number" step="0.1" value={editingEmp.multiplier} onChange={e => setEditingEmp({...editingEmp, multiplier: parseFloat(e.target.value) || 0})} className="w-full p-4 bg-gray-50 border rounded-2xl font-bold outline-none" />
                                        </div>
                                    </div>

                                    <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100">
                                        <div className="text-[10px] font-black text-orange-400 mb-1">分級預覽</div>
                                        <div className="font-black text-orange-600">{getPartnerLevel(editingEmp.skillsPassed)}</div>
                                    </div>
                                </div>
                                <button onClick={() => {
                                    if (!editingEmp.name || !editingEmp.startDate) { showMessage("請填寫完整資訊"); return; }
                                    if (isAddingNew) setEmployees(prev => [...prev, editingEmp]);
                                    else setEmployees(prev => prev.map(e => e.id === editingEmp.id ? editingEmp : e));
                                    setEditingEmp(null);
                                    showMessage('儲存成功');
                                }} className="w-full py-5 bg-black text-white rounded-2xl font-black shadow-lg active:scale-95 transition-transform">儲存並應用</button>
                            </div>
                        </div>
                    )}

                    {/* 刪除夥伴確認 Modal */}
                    {empToDelete && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="user-x" size={32} />
                                </div>
                                <h4 className="font-black mb-2 text-lg text-gray-800">移除夥伴確認</h4>
                                <p className="text-sm text-gray-500 font-bold mb-6">確定要將 <span className="text-red-600 font-black">「{empToDelete.name}」</span> 從名冊中移除嗎？</p>
                                <div className="flex flex-col gap-2">
                                    <button onClick={confirmDeleteEmpAction} className="w-full py-4 bg-red-600 text-white rounded-2xl font-black shadow-lg active:scale-95">確定移除</button>
                                    <button onClick={() => setEmpToDelete(null)} className="w-full py-4 bg-gray-100 text-gray-400 rounded-2xl font-black">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 系統提示訊息 */}
                    {systemMessage && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1000] bg-gray-900 text-white px-8 py-3 rounded-full font-black text-xs shadow-2xl animate-bounce">
                            {systemMessage}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
